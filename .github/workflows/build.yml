name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build BudgetPilot
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: budgetpilot/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: budgetpilot

      - name: Build
        run: npm run build
        working-directory: budgetpilot

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: budgetpilot/dist/
          retention-days: 7

      - name: Trigger E2E tests
        if: success()
        env:
          GH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "E2E_DISPATCH_TOKEN not configured — skipping E2E trigger"
            exit 0
          fi
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/encomp/budget-tracker-e2e/dispatches \
            -f event_type=app-build-complete \
            -f client_payload[app_run_id]="${{ github.run_id }}"
