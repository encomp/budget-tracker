name: Build + Upload Artifact

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build dist/
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: budgetpilot-dist
          path: dist/
          retention-days: 90
          if-no-files-found: error
